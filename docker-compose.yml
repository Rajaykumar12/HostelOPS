version: '3.8'

services:
  db:
    # Using alpine keeps the DB footprint tiny for the 1GB RAM constraint
    image: postgres:15-alpine
    container_name: competition_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: competition_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

  backend:
    build: .
    container_name: competition_backend
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_USER=postgres
      - DB_HOST=db
      - DB_NAME=competition_db
      - DB_PASSWORD=supersecret
      - DB_PORT=5432
    networks:
      - app-network

# This ensures database data survives container restarts (Crash resilience)
volumes:
  pgdata:

# Custom bridge network for secure internal container communication
networks:
  app-network:
    driver: bridge